name: Editorial Standards CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate YAML schemas
        run: |
          python3 -c "
          import yaml, glob, sys
          errors = 0
          for f in glob.glob('schemas/*.yaml'):
              try:
                  data = yaml.safe_load(open(f))
                  if not isinstance(data, dict):
                      print(f'::error file={f}::Not a valid YAML mapping')
                      errors += 1
                  else:
                      print(f'::notice file={f}::Valid ({len(data)} top-level keys)')
              except Exception as e:
                  print(f'::error file={f}::{e}')
                  errors += 1
          if errors:
              sys.exit(1)
          print(f'All {len(glob.glob(\"schemas/*.yaml\"))} schema files valid')
          "

      - name: Validate templates have frontmatter
        run: |
          python3 -c "
          import glob, sys
          errors = 0
          for f in glob.glob('templates/*.md'):
              content = open(f).read()
              if not content.startswith('---'):
                  print(f'::error file={f}::Missing frontmatter delimiters')
                  errors += 1
              parts = content.split('---', 2)
              if len(parts) < 3:
                  print(f'::error file={f}::Incomplete frontmatter')
                  errors += 1
              else:
                  print(f'::notice file={f}::Valid template')
          if errors:
              sys.exit(1)
          print(f'All {len(glob.glob(\"templates/*.md\"))} templates valid')
          "

      - name: Validate structure
        run: |
          test -f "README.md" && echo "::notice::README.md found" || echo "::warning::No README.md found"
          test -f "LICENSE" && echo "::notice::License file found" || echo "::warning::No license file found"

      - name: Success
        run: echo "::notice::Editorial Standards CI passed"
